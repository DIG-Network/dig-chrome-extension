<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="color-scheme" content="light">
  <title>DIG Network Content</title>
  <style>
    /* White product theme — matches welcome.html / the DIG Home NTP / hub.dig.net. */
    :root {
      --dig-bg: #f7f7fb; --dig-surface: #ffffff; --dig-text: #14122b;
      --dig-muted: #5e5a7c; --dig-border: #e4e1f0; --dig-purple: #5800D6; --dig-magenta: #FF00DE;
    }
    html, body { height: 100%; }
    body {
      margin: 0; padding: 0; overflow: hidden; background: var(--dig-bg); color: var(--dig-text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
    }
    iframe { width: 100%; height: 100vh; border: none; background: #fff; }
    /* Branded loading state. */
    .loading {
      position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
      display: flex; flex-direction: column; align-items: center; gap: 14px;
      color: var(--dig-muted); font-size: 14px; text-align: center;
    }
    .loading .spinner {
      width: 28px; height: 28px; border-radius: 50%;
      border: 3px solid var(--dig-border); border-top-color: var(--dig-purple);
      animation: dig-spin 0.8s linear infinite;
    }
    @keyframes dig-spin { to { transform: rotate(360deg); } }
    /* Verified badge banner — one canonical label, matching the popup + toolbar. */
    #verifyBanner {
      position: fixed; top: 0; left: 0; right: 0; z-index: 2147483647;
      display: none; align-items: center; gap: 8px;
      padding: 6px 14px; font: 600 12.5px/1.3 'Space Grotesk','Segoe UI',system-ui,sans-serif;
      color: #fff; box-shadow: 0 1px 6px rgba(0,0,0,.15);
    }
    #verifyBanner.verified { display: flex; background: #1a8f5a; }
    #verifyBanner.failed   { display: flex; background: #d92d20; }
    #verifyBanner .dot { width: 8px; height: 8px; border-radius: 50%; background: #fff; opacity: .9; }
    #verifyBanner .x { margin-left: auto; cursor: pointer; opacity: .8; }
    #verifyBanner .x:hover { opacity: 1; }
    /* When the banner is shown, nudge the iframe down so it isn't covered. */
    body.has-banner iframe { height: calc(100vh - 30px); margin-top: 30px; }
  </style>
</head>
<body>
  <div id="verifyBanner" role="status" aria-live="polite" data-testid="verify-banner" data-verified="">
    <span class="dot"></span><span id="verifyText" data-testid="verify-text"></span>
    <span class="x" id="verifyClose" title="Dismiss" role="button" aria-label="Dismiss">×</span>
  </div>
  <div class="loading" id="loading" role="status">
    <span class="spinner" aria-hidden="true"></span>
    <span id="loadingText">Loading DIG content…</span>
  </div>
  <!-- Mount point the branded error page renders into (replaces the loading state).
       On a failure the document carries data-dig-error=<DIG_ERR_* code> so an agent can read
       the machine discriminant without scraping the (deliberately friendly) human copy. -->
  <div id="errorMount" data-testid="error-mount"></div>
  <script type="module" src="/src/entries/dig-viewer.ts"></script>
</body>
</html>
