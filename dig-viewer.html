<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIG Network Content</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: #000;
    }
    iframe {
      width: 100%;
      height: 100vh;
      border: none;
    }
    .loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: #fff;
      font-family: Arial, sans-serif;
    }
    /* Verified badge banner — mirrors the native DIG Browser's verified state. */
    #verifyBanner {
      position: fixed; top: 0; left: 0; right: 0; z-index: 2147483647;
      display: none; align-items: center; gap: 8px;
      padding: 6px 14px; font: 600 12.5px/1.3 'Space Grotesk','Segoe UI',system-ui,sans-serif;
      color: #fff; box-shadow: 0 1px 6px rgba(0,0,0,.25);
    }
    #verifyBanner.verified { display: flex; background: #1a8f5a; }
    #verifyBanner.failed   { display: flex; background: #d92d20; }
    #verifyBanner .dot { width: 8px; height: 8px; border-radius: 50%; background: #fff; opacity: .9; }
    #verifyBanner .x { margin-left: auto; cursor: pointer; opacity: .8; }
    #verifyBanner .x:hover { opacity: 1; }
    /* When the banner is shown, nudge the iframe down so it isn't covered. */
    body.has-banner iframe { height: calc(100vh - 30px); margin-top: 30px; }
  </style>
</head>
<body>
  <div id="verifyBanner" role="status" aria-live="polite">
    <span class="dot"></span><span id="verifyText"></span>
    <span class="x" id="verifyClose" title="Dismiss">×</span>
  </div>
  <div class="loading" id="loading">Loading DIG content...</div>
  <script src="dig-viewer.js"></script>
</body>
</html>
