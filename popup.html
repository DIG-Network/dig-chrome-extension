<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DIG Network Extension</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="logo">
        <!-- Vector wordmark (matches docs.dig.net light-mode navbar). -->
        <img src="src/Wordmark-Black.svg" alt="DIG Network">
        <span class="alpha-badge" title="Pre-release — expect rough edges">alpha</span>
      </div>
      <a id="visitDigNetworkLink" class="header-link" href="#" title="Visit DIG Network">dig.net ↗</a>
    </div>

    <!-- Verified badge line: reflects the active tab's chia:// verification state.
         One canonical label ("Verified on Chia") + one tooltip, matching the viewer
         banner and the toolbar badge. -->
    <div class="verify-line" id="verifyLine" style="display:none"
         title="Merkle-proven against the on-chain root and decrypted on this device">
      <span class="verify-dot" id="verifyDot"></span>
      <span class="verify-text" id="verifyText">Verified on Chia</span>
    </div>

    <!-- Wallet panel: balance + connect/disconnect (WalletConnect → Sage) + Get DIG. -->
    <div class="wallet-section">
      <div class="wallet-head">
        <span class="wallet-title">Wallet</span>
        <span class="wallet-state" id="walletState">Not connected</span>
      </div>
      <div class="wallet-balances" id="walletBalances" style="display:none">
        <div class="wallet-bal">
          <span class="wallet-bal-label">XCH</span>
          <span class="wallet-bal-value" id="walletXch">—</span>
        </div>
        <div class="wallet-bal">
          <span class="wallet-bal-label">$DIG</span>
          <span class="wallet-bal-value" id="walletDig">—</span>
        </div>
      </div>
      <div class="wallet-address" id="walletAddress" style="display:none"></div>
      <div class="wallet-actions">
        <button id="walletConnectBtn" class="wallet-btn wallet-btn-primary">Connect wallet</button>
        <button id="walletDisconnectBtn" class="wallet-btn" style="display:none">Disconnect</button>
        <a id="getDigLink" class="wallet-btn wallet-btn-ghost" href="#" title="Get $DIG on TibetSwap">Get $DIG ↗</a>
      </div>
      <!-- Pairing affordance (URI / copy) appears here when connecting. -->
      <div class="wallet-pairing" id="walletPairing" style="display:none">
        <p class="wallet-pairing-hint">Open Sage → scan or paste this pairing link:</p>
        <div class="wallet-pairing-row">
          <input type="text" id="walletPairingUri" class="wallet-pairing-uri" readonly>
          <button id="walletPairingCopy" class="restore-button" title="Copy">⧉</button>
        </div>
      </div>
      <p class="wallet-note" id="walletNote"></p>
    </div>

    <!-- Per-origin connection requests from dapps' window.chia.connect(). -->
    <div class="connreq-section" id="connreqSection" style="display:none">
      <p class="connreq-label">Connection requests</p>
      <div class="connreq-list" id="connreqList"></div>
    </div>

    <!-- Ecosystem funnel: drive users from the RPC client into DIGHUb. -->
    <div class="hub-section">
      <button id="browseHubButton" class="hub-button" title="Browse DIGHUb">
        <span class="hub-button-title">Browse DIGHUb</span>
        <span class="hub-button-sub">Explore &amp; publish on hub.dig.net</span>
      </button>
    </div>

    <!-- Open a chia:// address — the one thing this extension is for. -->
    <div class="url-section">
      <label for="digUrlInput" class="url-label">Open a chia:// address</label>
      <div class="url-input-container">
        <input
          type="text"
          id="digUrlInput"
          class="url-input"
          placeholder="chia://urn:dig:chia:storeID/path"
          autocomplete="off"
        />
        <button id="goButton" class="go-button" title="Open">→</button>
      </div>
    </div>

    <div class="toggle-section">
      <label class="toggle-label">
        <span class="toggle-text">chia:// resolution</span>
        <div class="toggle-container">
          <input type="checkbox" id="extensionToggle" class="toggle-input">
          <span class="toggle-slider"></span>
        </div>
      </label>
      <p class="status-text" id="statusText">Inactive</p>
    </div>

    <!-- Ecosystem funnel: Resources + soft upsell to the full native DIG Browser. -->
    <div class="resources-section">
      <p class="resources-label">Resources</p>
      <div class="resources-links" id="resourcesLinks">
        <!-- Populated from RESOURCE_LINKS in popup.js so destinations stay in one place. -->
      </div>
      <a id="getFullBrowserLink" class="upsell-link" href="#" title="Get the full DIG Browser">
        Get the full DIG Browser — native dig:// &amp; built-in wallet ↗
      </a>
      <a id="openOptionsLink" class="upsell-link" href="#" title="DIG settings: cache, dig-node &amp; RPC">
        DIG settings — cache, dig-node &amp; RPC →
      </a>
    </div>
  </div>
  <script src="popup.js"></script>
  <script type="module" src="popup-wallet.js"></script>
</body>
</html>
