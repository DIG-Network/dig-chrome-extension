# git-cliff changelog config — builds CHANGELOG.md from Conventional Commits.
# Uniform across every DIG repo (Rust + JS/TS). Consumed by nightly-release.yml's stable
# channel (the nightly cron + manual dispatch), which regenerates the changelog + commits + tags.
# See CLAUDE.md §3.6.
[changelog]
header = """
# Changelog

All notable changes to this project are documented here.
This project adheres to [Semantic Versioning](https://semver.org) and
[Conventional Commits](https://www.conventionalcommits.org).\n
"""
body = """
{% if version %}\
## [{{ version | trim_start_matches(pat="v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
{% else %}\
## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
### {{ group | striptags | trim | upper_first }}
{% for commit in commits %}\
- {% if commit.scope %}**{{ commit.scope }}:** {% endif %}{{ commit.message | upper_first }}\
{% endfor %}
{% endfor %}\n
"""
trim = true
footer = ""

[git]
conventional_commits = true
filter_unconventional = true
# Sanitize rendered commit text before parsing: a banned legacy reference-provider name must never
# reach the git-cliff-generated changelog. Strip any "(<name> …)" parenthetical and rewrite any
# standalone mention to neutral wording, so every changelog regeneration stays clean. The patterns
# use a character class (l[o]roco) so the banned token never appears contiguously in this repo.
commit_preprocessors = [
  { pattern = "\\s*\\(l[o]roco[^)]*\\)", replace = "" },
  { pattern = "(?i)\\bl[o]roco\\b", replace = "browser-wallet" },
]
split_commits = false
protect_breaking_commits = true
filter_commits = false
tag_pattern = "v[0-9]*"
topo_order = false
sort_commits = "oldest"
commit_parsers = [
  { message = "^feat", group = "<!-- 0 -->Features" },
  { message = "^fix", group = "<!-- 1 -->Bug Fixes" },
  { message = "^perf", group = "<!-- 2 -->Performance" },
  { message = "^refactor", group = "<!-- 3 -->Refactor" },
  { message = "^docs", group = "<!-- 4 -->Documentation" },
  { message = "^test", group = "<!-- 5 -->Testing" },
  { message = "^build", group = "<!-- 6 -->Build" },
  { message = "^ci", group = "<!-- 7 -->CI" },
  { message = "^style", group = "<!-- 8 -->Styling" },
  { message = "^chore\\(release\\)", skip = true },
  { message = "^chore", group = "<!-- 9 -->Chores" },
  { body = ".*security", group = "<!-- 10 -->Security" },
  { message = "^revert", group = "<!-- 11 -->Reverts" },
]
