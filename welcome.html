<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Welcome to DIG Network</title>
  <style>
    /* DIG brand palette (white product theme — matches hub.dig.net + the browser NTP). */
    :root {
      --dig-bg: #f7f7fb;
      --dig-surface: #ffffff;
      --dig-text: #14122b;
      --dig-muted: #5e5a7c;
      --dig-border: #e4e1f0;
      --dig-purple: #5800D6;
      --dig-magenta: #FF00DE;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--dig-bg);
      color: var(--dig-text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
      padding: 32px;
    }
    .card {
      max-width: 560px;
      width: 100%;
      text-align: center;
      background: var(--dig-surface);
      border: 1px solid var(--dig-border);
      border-radius: 16px;
      padding: 40px 36px;
      box-shadow: 0 8px 32px rgba(20, 18, 43, 0.08);
    }
    .logo {
      max-height: 48px;
      width: auto;
      margin-bottom: 24px;
    }
    h1 {
      font-size: 26px;
      font-weight: 700;
      margin-bottom: 12px;
    }
    p.lead {
      font-size: 15px;
      line-height: 1.6;
      color: var(--dig-muted);
      margin-bottom: 28px;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      justify-content: center;
    }
    .btn {
      flex: 1 1 200px;
      padding: 14px 18px;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 600;
      text-decoration: none;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .btn-primary {
      background: linear-gradient(135deg, #5800D6 0%, #FF00DE 100%);
      color: #FFFFFF;
      border: none;
      box-shadow: 0 4px 14px rgba(88, 0, 214, 0.35);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 18px rgba(88, 0, 214, 0.5);
    }
    .btn-secondary {
      background: var(--dig-surface);
      color: var(--dig-purple);
      border: 1px solid var(--dig-purple);
    }
    .btn-secondary:hover {
      background: rgba(88, 0, 214, 0.08);
      border-color: var(--dig-purple);
    }
    .footnote {
      margin-top: 28px;
      font-size: 12px;
      color: var(--dig-muted);
      line-height: 1.6;
    }
    .footnote a {
      color: var(--dig-purple);
      text-decoration: none;
    }
    .footnote a:hover { color: var(--dig-magenta); }
  </style>
</head>
<body>
  <div class="card">
    <img class="logo" src="src/Wordmark-Black.svg" alt="DIG Network">
    <h1>Welcome to the DIG Network Extension</h1>
    <p class="lead">
      You can now open <strong>chia://</strong> links and browse DIG content right in your
      browser. Here's where to go next.
    </p>
    <div class="actions">
      <a id="visitDigNetwork" class="btn btn-primary" href="#">Visit DIG Network</a>
      <a id="readTheDocs" class="btn btn-secondary" href="#">Read the docs</a>
    </div>
    <p class="footnote">
      Want the full experience? Try the
      <a id="getFullBrowser" href="#">native DIG Browser</a> — built-in wallet and native
      dig:// support, no extension needed.
    </p>
  </div>
  <script type="module" src="welcome.js"></script>
</body>
</html>
