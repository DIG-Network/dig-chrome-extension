# ─────────────────────────────────────────────────────────────────────────────────────────────
# The nightly + manual-dispatch RELEASE ORCHESTRATOR (dig_ecosystem #596, epic #590). Adapted from
# the ecosystem's REFERENCE nightlies implementation (DIG-Network/dig-updater) to this repo's
# JS / Chrome-Web-Store extension stack. The normative contract is SPEC.md §19; the ops runbook is
# runbooks/release.md.
#
# It replaces the old "tag-and-release-on-every-merge-to-main" model (the former release.yml, which
# this file supersedes). Releases are no longer cut per merge; they are batched to a nightly cron
# (+ manual dispatch), across two channels:
#
#   • STABLE channel  (job `stable`): the unchanged changelog+tag logic, now driven by the cron
#     instead of push-to-main. It reads the version from package.json and cuts `vX.Y.Z` ONLY when
#     that tag does not already exist — i.e. only when the version file was bumped since the last
#     release (an unchanged version = the tag exists = a no-op). Cutting the tag = git-cliff
#     regenerates CHANGELOG.md, commits it to main, tags that commit `vX.Y.Z`, and pushes both with
#     RELEASE_TOKEN. The pushed `v*` tag then fires the STABLE build+publish (deploy.yml → the
#     packaged zip on the GitHub Release, and publish-chrome-web-store.yml → the Web Store). This is
#     the SAME stable path as before — only its trigger changed.
#
#   • NIGHTLY channel (job `nightly`): every night it builds `main` HEAD and publishes a GitHub
#     PRE-release (never `latest`) under a dated tag `nightly-YYYYMMDD` plus a force-moved rolling
#     `nightly` tag, so there is ALWAYS a fresh nightly regardless of a version bump. It synthesizes
#     a semver-prerelease version `X.Y.Z-nightly.YYYYMMDD.<shortsha>` at BUILD time (nothing is
#     committed), packages the extension zip, and prunes dated nightlies to a retention window.
#     Ext adaptation: a nightly is the GitHub pre-release ZIP for SIDELOAD ONLY — it is NEVER
#     auto-published to the Chrome Web Store (that would ship unstable code to every user + burn
#     review latency; a separate unlisted "nightly" store item is an optional future follow-up).
#
# Manual invocation (`workflow_dispatch`) drives EITHER channel on demand — choose `stable`,
# `nightly`, or `both`; `force` re-cuts a stable release even when the version is unchanged.
#
# RELEASE_TOKEN posture (both channels): a tag pushed by the default GITHUB_TOKEN does NOT trigger
# downstream workflows (GitHub anti-recursion) and GITHUB_TOKEN cannot push past branch protection,
# so releases use the RELEASE_TOKEN org PAT. If RELEASE_TOKEN is absent, every channel NO-OPS with
# a clear warning instead of half-releasing — add the org secret to enable releases.
#
# 60-day auto-disable (GitHub platform behavior, not this workflow's): GitHub disables a
# `schedule:` trigger after 60 days with NO repo activity on a public repo, with no auto-re-enable
# — and since #590 removed the push-to-main trigger, this cron is the ONLY automatic release path.
# If nightlies silently stop, check `gh api repos/<owner>/<repo>/actions/workflows/
# nightly-release.yml --jq .state` and re-enable with `gh workflow enable nightly-release.yml`
# (see runbooks/release.md + SPEC.md §19).
# ─────────────────────────────────────────────────────────────────────────────────────────────
name: Nightly + stable release

on:
  # Midnight UTC — GitHub Actions cron is ALWAYS UTC. GitHub may delay a top-of-hour cron under
  # load; that is acceptable here (a nightly a little late is fine, and the stable channel is
  # idempotent — a delayed or skipped run just re-checks next time).
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      channel:
        description: "Which channel(s) to release."
        type: choice
        options: [both, stable, nightly]
        default: both
      force:
        description: "Force a STABLE release even if the version is unchanged (re-cut the tag)."
        type: boolean
        default: false

concurrency:
  # Serialize release runs so an overlapping cron + manual dispatch can never race on tags/releases.
  group: nightly-release
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  # ───────────────────────────────── STABLE channel ─────────────────────────────────
  # The converted on-merge tagger: version-detect → skip-if-already-tagged → git-cliff changelog
  # → commit + tag + push (RELEASE_TOKEN). The pushed `v*` tag fires deploy.yml (build + attach the
  # zip to the GitHub Release) and publish-chrome-web-store.yml (upload + publish to the Web Store).
  stable:
    name: Stable — changelog + tag
    # Run on the schedule (both channels) or when dispatch selects stable/both. The
    # `!startsWith(...chore(release):...)` guard is preserved from the on-merge era: it is INERT on
    # schedule/dispatch (there is no `head_commit`), but it keeps the release changelog commit
    # self-labelled so the loop stays safe even if a push trigger is ever re-introduced.
    if: >-
      ${{
        !startsWith(github.event.head_commit.message, 'chore(release):') &&
        (github.event_name == 'schedule' || inputs.channel == 'stable' || inputs.channel == 'both')
      }}
    runs-on: ubuntu-latest
    steps:
      - name: Require RELEASE_TOKEN (else no-op)
        id: token
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -z "$RELEASE_TOKEN" ]; then
            echo "::warning::RELEASE_TOKEN is not set on this repo. The stable changelog+tag release is a NO-OP until the org-level PAT secret is added (see runbooks/release.md + SPEC.md §19). Nothing will be released."
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout
        if: steps.token.outputs.present == 'true'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          # Pin to `main` explicitly (opus hardening the fan-out copies carry): a schedule/dispatch
          # run already defaults to the branch it ran on, but pinning makes the `HEAD:main` push
          # below unambiguous — the changelog commit + tag can only ever land on `main` HEAD.
          ref: main
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Resolve version + skip if already tagged
        if: steps.token.outputs.present == 'true'
        id: ver
        shell: bash
        env:
          FORCE: ${{ inputs.force }}
          GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          set -euo pipefail
          # The version source of truth for this stack is package.json (there is no Cargo.toml).
          pkg() { [ -f package.json ] && jq -r '.version // ""' package.json 2>/dev/null || echo ""; }
          VER="$(pkg)"
          if [ -z "$VER" ]; then echo "skip=true" >>"$GITHUB_OUTPUT"; echo "No version file — nothing to release."; exit 0; fi
          TAG="v$VER"
          # The idempotency keystone: an unchanged version means `vX.Y.Z` already exists, so the run
          # is a no-op — UNLESS `force` was requested (a manual re-cut of the same version).
          if git rev-parse -q --verify "refs/tags/$TAG" >/dev/null \
             || git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1; then
            if [ "$FORCE" = "true" ]; then
              # Supply-chain guard (R1): a PUBLISHED release is a shipped artifact — force-moving its
              # tag onto a different commit would silently overwrite that version's zip/Web-Store
              # build with code nobody reviewed under it. Only allow the re-cut when it is SAFE: the
              # tag already points at the commit we're about to build (a legitimate "the build
              # failed, re-fire deploy.yml" retry), or the tag has no published release yet (a repair
              # of a bare/failed tag). Resolve the tag's commit locally first, falling back to the
              # remote (mirrors the existence check above, which is dual local/remote too).
              TAG_COMMIT="$(git rev-parse -q --verify "refs/tags/$TAG^{commit}" 2>/dev/null || true)"
              if [ -z "$TAG_COMMIT" ]; then
                TAG_COMMIT="$(git ls-remote origin "refs/tags/$TAG^{}" 2>/dev/null | cut -f1)"
              fi
              if [ -z "$TAG_COMMIT" ]; then
                TAG_COMMIT="$(git ls-remote origin "refs/tags/$TAG" 2>/dev/null | cut -f1)"
              fi
              HEAD_COMMIT="$(git rev-parse HEAD)"
              IS_PUBLISHED_RELEASE="$(gh release view "$TAG" --repo "$GITHUB_REPOSITORY" --json isDraft --jq '.isDraft == false' 2>/dev/null || echo "false")"
              if [ "$IS_PUBLISHED_RELEASE" = "true" ] && [ "$TAG_COMMIT" != "$HEAD_COMMIT" ]; then
                echo "::error::refusing to force-move $TAG — a PUBLISHED release already exists for it and the tag points at a different commit ($TAG_COMMIT) than this run's target ($HEAD_COMMIT). force is only for re-cutting the SAME commit (a failed-build retry) or repairing a tag with no published release. Bump the version instead of overwriting a shipped release."
                exit 1
              fi
              echo "Tag $TAG already exists but force=true — re-cutting (the tag will be moved)."
              echo "force=true" >>"$GITHUB_OUTPUT"
            else
              echo "skip=true" >>"$GITHUB_OUTPUT"; echo "Tag $TAG already exists — no-op."; exit 0
            fi
          fi
          echo "skip=false" >>"$GITHUB_OUTPUT"
          echo "tag=$TAG" >>"$GITHUB_OUTPUT"
          echo "Releasing $TAG"

      - name: Install git-cliff
        if: steps.token.outputs.present == 'true' && steps.ver.outputs.skip == 'false'
        uses: taiki-e/install-action@v2
        with:
          tool: git-cliff

      - name: Generate changelog
        if: steps.token.outputs.present == 'true' && steps.ver.outputs.skip == 'false'
        run: git-cliff --config cliff.toml --tag "${{ steps.ver.outputs.tag }}" --output CHANGELOG.md

      - name: Commit changelog, tag, push
        if: steps.token.outputs.present == 'true' && steps.ver.outputs.skip == 'false'
        shell: bash
        env:
          FORCE_TAG: ${{ steps.ver.outputs.force }}
        run: |
          set -euo pipefail
          git config user.name "dig-release-bot"
          git config user.email "release-bot@users.noreply.github.com"
          git add CHANGELOG.md
          # `chore(release):` prefix labels the release commit so a re-introduced push trigger would
          # skip it (the loop guard on the job `if:`).
          git commit -m "chore(release): ${{ steps.ver.outputs.tag }}" || echo "changelog unchanged"
          # A `force` re-cut moves an existing tag onto the fresh changelog commit; a normal cut
          # creates a new tag. Main is NEVER force-pushed.
          if [ "$FORCE_TAG" = "true" ]; then
            git tag -f -a "${{ steps.ver.outputs.tag }}" -m "Release ${{ steps.ver.outputs.tag }}"
            git push origin "HEAD:main"
            git push -f origin "${{ steps.ver.outputs.tag }}"
          else
            git tag -a "${{ steps.ver.outputs.tag }}" -m "Release ${{ steps.ver.outputs.tag }}"
            git push origin "HEAD:main"
            git push origin "${{ steps.ver.outputs.tag }}"
          fi
          echo "Pushed changelog commit + ${{ steps.ver.outputs.tag }} — deploy.yml (build+zip) + publish-chrome-web-store.yml will fire."

  # ───────────────────────────────── NIGHTLY channel ─────────────────────────────────
  # Build main HEAD, package the extension zip stamped with a synthesized prerelease version, and
  # publish it to a dated + rolling PRE-release (never `latest`), then prune old nightlies. Single
  # runner (the extension is one zip, not a cross-OS binary matrix), so meta+build+publish is one job.
  nightly:
    name: Nightly — build + pre-release zip
    if: >-
      ${{ github.event_name == 'schedule' || inputs.channel == 'nightly' || inputs.channel == 'both' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write # publish pre-releases / upload assets
    # Expose the synthesized version + dated tag so the gated `nightly-publish-crx` job can re-stamp
    # the SAME nightly version, pack+sign the CRX, and publish it to updates.dig.net/ext/nightly/.
    outputs:
      present: ${{ steps.token.outputs.present }}
      version: ${{ steps.v.outputs.version }}
      dated_tag: ${{ steps.v.outputs.dated_tag }}
      title: ${{ steps.v.outputs.title }}
    env:
      # How many dated `nightly-YYYYMMDD` pre-releases to retain; older ones (and their tags) are
      # pruned each run. The rolling `nightly` and all `v*` stable releases are NEVER pruned.
      KEEP_NIGHTLIES: 14
      GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      REPO: ${{ github.repository }}
    steps:
      - name: Require RELEASE_TOKEN (else no-op)
        id: token
        env:
          RELEASE_TOKEN: ${{ secrets.RELEASE_TOKEN }}
        run: |
          if [ -z "$RELEASE_TOKEN" ]; then
            echo "::warning::RELEASE_TOKEN is not set on this repo. The nightly pre-release is a NO-OP until the org-level PAT secret is added (see runbooks/release.md + SPEC.md §19)."
            echo "present=false" >> "$GITHUB_OUTPUT"
          else
            echo "present=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Checkout (main HEAD, with push credentials)
        if: steps.token.outputs.present == 'true'
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}

      - name: Set up Node
        if: steps.token.outputs.present == 'true'
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm

      - name: Synthesize the nightly version + tags
        if: steps.token.outputs.present == 'true'
        id: v
        shell: bash
        run: |
          set -euo pipefail
          BASE="$(jq -r '.version' package.json)"   # e.g. 1.100.1 (the current package.json version)
          DATE="$(date -u +%Y%m%d)"                 # e.g. 20260714 (UTC)
          DATE_DASH="$(date -u +%Y-%m-%d)"          # e.g. 2026-07-14 (UTC, for the human title)
          SHA="$(git rev-parse --short HEAD)"
          # Semver PRERELEASE version — sorts BELOW the plain `X.Y.Z`, so a nightly never outranks
          # the stable release of the same version. Built at CI time; never committed.
          echo "version=${BASE}-nightly.${DATE}.${SHA}" >> "$GITHUB_OUTPUT"
          echo "dated_tag=nightly-${DATE}" >> "$GITHUB_OUTPUT"
          echo "title=Nightly ${DATE_DASH} (${SHA})" >> "$GITHUB_OUTPUT"

      - name: Install dependencies
        if: steps.token.outputs.present == 'true'
        run: npm ci || npm install

      # .npmrc sets ignore-scripts=true (supply-chain lockdown, #67 P0-1a); re-run only the reviewed
      # allowlist (esbuild/@swc) before the build that relies on it.
      - name: Allow reviewed install scripts
        if: steps.token.outputs.present == 'true'
        run: npm run allow-scripts

      - name: Stamp the nightly version into package.json (never committed)
        if: steps.token.outputs.present == 'true'
        env:
          NIGHTLY_VERSION: ${{ steps.v.outputs.version }}
        run: |
          # package.json is the single version source: Vite `define` (__APP_VERSION__), build.js's
          # manifest injection + app-version placeholder + agent-surface + the zip name all read it.
          # Stamping the prerelease version here makes ALL of those carry the exact nightly build for
          # §6.7 bug-report attribution. build.js strips the suffix for the (Chrome-valid dotted)
          # manifest `version` and preserves the full string in `version_name`. Never committed — the
          # tag below points at the clean main HEAD commit, not this dirty working tree.
          node -e "const fs=require('fs');const p=require('./package.json');p.version=process.env.NIGHTLY_VERSION;fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');console.log('stamped',p.version)"

      - name: Build + package the nightly zip
        if: steps.token.outputs.present == 'true'
        run: npm run build:zip # node build.js --zip -> ./dist + ./dig-network-extension-v<version>.zip

      - name: Move nightly tags (dated + rolling) to this build
        if: steps.token.outputs.present == 'true'
        shell: bash
        env:
          DATED_TAG: ${{ steps.v.outputs.dated_tag }}
        run: |
          set -euo pipefail
          git config user.name "dig-release-bot"
          git config user.email "release-bot@users.noreply.github.com"
          # Force so a same-day re-run (or the moving rolling pointer) is idempotent. Neither
          # `nightly-*` nor `nightly` matches deploy.yml's `v*` trigger, so no stable build fires.
          # HEAD is the clean main commit (the stamped package.json is uncommitted, not pushed).
          git push -f origin "HEAD:refs/tags/${DATED_TAG}"
          git push -f origin "HEAD:refs/tags/nightly"

      - name: Publish the dated + rolling pre-releases
        if: steps.token.outputs.present == 'true'
        shell: bash
        env:
          DATED_TAG: ${{ steps.v.outputs.dated_tag }}
          TITLE: ${{ steps.v.outputs.title }}
          NIGHTLY_VERSION: ${{ steps.v.outputs.version }}
        run: |
          set -euo pipefail
          ZIP="$(ls dig-network-extension-v*.zip | head -n1)"
          if [ -z "$ZIP" ]; then echo "::error::no packaged nightly zip found" >&2; exit 1; fi
          NOTES="Automated nightly pre-release built from \`main\` HEAD (${TITLE}). Version \`${NIGHTLY_VERSION}\`. Pre-release — NOT a stable release; download the zip and load it unpacked (sideload) to track the nightly channel. This is NOT published to the Chrome Web Store."

          # The GitHub Releases asset API is intermittently flaky (transient HTTP 5xx — a real
          # `HTTP 503: No server is currently available` on 2026-07-20 reddened this step and dropped
          # the nightly zip, dig_ecosystem#1293). Under `set -e` a single blip aborts the whole
          # publish, so wrap each network gh call in retry-with-backoff: up to 5 attempts, 5s→10s→
          # 15s→20s linear backoff, and only THEN fail loudly. A persistent failure still reds the
          # step (never a silent miss); a transient one is absorbed.
          retry() {
            local n=1 max=5 delay=5
            until "$@"; do
              if [ "$n" -ge "$max" ]; then
                echo "::error::\`$*\` still failing after ${max} attempts" >&2
                return 1
              fi
              echo "attempt ${n}/${max} of \`$*\` failed — retrying in ${delay}s..." >&2
              sleep "$delay"
              n=$((n + 1)); delay=$((delay + 5))
            done
          }

          # Existence probe that survives a flaky Releases API WITHOUT misrouting a transient view
          # blip into a spurious `create` (dig_ecosystem#1293 review). A `gh release view` on a
          # missing release AND a 5xx both exit 1, so they are indistinguishable by exit code alone —
          # disambiguate on stderr: "release not found" (a genuine 404) means proceed to create; any
          # other failure is a transient API error, retried with the same backoff and only THEN
          # failing loudly (a non-404 must never be silently treated as "absent" — that would create
          # a duplicate/overwrite a real release). Echoes `yes`/`no`; returns non-zero on a persistent
          # transient error so the caller aborts under `set -e`.
          release_exists() {
            local tag="$1" n=1 max=5 delay=5 out
            while :; do
              if out="$(gh release view "$tag" --repo "$REPO" 2>&1)"; then echo yes; return 0; fi
              if printf '%s' "$out" | grep -qi 'release not found'; then echo no; return 0; fi
              if [ "$n" -ge "$max" ]; then
                echo "::error::gh release view $tag failed transiently after ${max} attempts: ${out}" >&2
                return 1
              fi
              echo "attempt ${n}/${max} of release-existence probe for ${tag} failed transiently — retrying in ${delay}s..." >&2
              sleep "$delay"
              n=$((n + 1)); delay=$((delay + 5))
            done
          }

          # Ensure a prerelease exists at the tag, keep its metadata current, and replace ALL of its
          # assets with THIS run's zip. The zip filename embeds the date+sha, so a stale asset would
          # otherwise linger on the rolling `nightly` release — clear then upload. `--latest=false`
          # keeps the nightly out of the `latest` slot (only a stable release moves it). Applied to
          # both the immutable dated tag and the rolling `nightly` pointer.
          refresh_release() {
            local tag="$1" exists assets
            exists="$(release_exists "$tag")"   # aborts under set -e on a persistent transient error
            if [ "$exists" = "no" ]; then
              retry gh release create "$tag" --repo "$REPO" --verify-tag \
                --prerelease --latest=false --title "$TITLE" --notes "$NOTES"
            fi
            retry gh release edit "$tag" --repo "$REPO" --prerelease --latest=false --title "$TITLE" >/dev/null
            # Capture the (retried) asset listing into a variable first — piping the raw `gh release
            # view` straight into `while read` left the listing unretried and aborting on a 5xx.
            assets="$(retry gh release view "$tag" --repo "$REPO" --json assets --jq '.assets[].name')"
            while read -r asset; do
              [ -n "$asset" ] && retry gh release delete-asset "$tag" "$asset" --repo "$REPO" --yes
            done <<< "$assets"
            retry gh release upload "$tag" "$ZIP" --repo "$REPO"
          }

          refresh_release "${DATED_TAG}"
          refresh_release "nightly"
          echo "Published ${DATED_TAG} + moved rolling nightly (zip: ${ZIP})."

      - name: Prune old nightlies (keep newest KEEP_NIGHTLIES + the rolling tag)
        if: steps.token.outputs.present == 'true'
        shell: bash
        run: |
          set -euo pipefail
          # `gh release list` runs as its own un-swallowed statement — a real listing failure
          # (auth/API/network) reds this step per `set -e`, rather than being masked into a silent
          # empty-prune. Only the DOWNSTREAM grep's exit 1 (its normal "no dated nightlies matched"
          # on a quiet/new repo) is tolerated — a listing failure surfaces, a genuine empty match
          # does not.
          ALL_TAGS="$(gh release list --repo "$REPO" --limit 1000 --json tagName --jq '.[].tagName')"
          # Dated nightly tags ONLY: `nightly-YYYYMMDD` sorts chronologically as text, so `sort -r`
          # is newest-first. The rolling `nightly` and every `v*` stable tag are excluded by the
          # pattern and are never touched.
          mapfile -t dated < <(
            printf '%s\n' "$ALL_TAGS" | grep -E '^nightly-[0-9]{8}$' | sort -r || [ $? -eq 1 ]
          )
          # Everything past the newest KEEP_NIGHTLIES is pruned — release AND git tag together.
          for tag in "${dated[@]:$KEEP_NIGHTLIES}"; do
            echo "Pruning old nightly: $tag"
            gh release delete "$tag" --repo "$REPO" --yes --cleanup-tag
          done
          echo "Retention: kept newest $KEEP_NIGHTLIES dated nightlies + the rolling nightly."

  # ───────────────────────────── NIGHTLY self-update publish (gated) ─────────────────────────────
  # Pack + sign the nightly CRX3 (#607) and publish it + its Omaha updates.xml to
  # updates.dig.net/ext/nightly/ so force-installed browsers on the nightly channel auto-update. The
  # SIGNING KEY and the PUBLISH ROLE are collapsed behind the `release` GitHub ENVIRONMENT — only
  # this gated job can sign or publish, so the automated sideload-zip nightly above stays ungated.
  # It re-stamps the SAME synthesized nightly version the `nightly` job built, so the CRX manifest
  # version = X.Y.Z.<days-since-2020-01-01> matches the version_name on the sideload zip.
  nightly-publish-crx:
    name: Nightly — sign + publish CRX3
    needs: nightly
    if: needs.nightly.outputs.present == 'true' && needs.nightly.outputs.version != ''
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write # attach the CRX + updates.xml to the nightly pre-releases
      id-token: write # OIDC: assume the updates.dig.net ext deploy role
    env:
      GH_TOKEN: ${{ secrets.RELEASE_TOKEN }}
      REPO: ${{ github.repository }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.RELEASE_TOKEN }}
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
          cache: npm
      - run: npm ci || npm install
      - run: npm run allow-scripts
      - name: Re-stamp the nightly version (never committed)
        env:
          NIGHTLY_VERSION: ${{ needs.nightly.outputs.version }}
        run: node -e "const fs=require('fs');const p=require('./package.json');p.version=process.env.NIGHTLY_VERSION;fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n');console.log('stamped',p.version)"
      - name: Pack + sign the nightly CRX3 + emit updates.xml
        env:
          EXT_NIGHTLY_CRX_KEY: ${{ secrets.EXT_NIGHTLY_CRX_KEY }}
        run: |
          if [ -z "$EXT_NIGHTLY_CRX_KEY" ]; then
            echo "::error::EXT_NIGHTLY_CRX_KEY (release-environment secret) is not set — cannot sign the nightly CRX."
            exit 1
          fi
          node build.js --crx --channel nightly # ./dist + ./dig-network-extension-v<version>.crx + ./updates.xml
      - name: Attach CRX + updates.xml to the dated + rolling pre-releases
        env:
          DATED_TAG: ${{ needs.nightly.outputs.dated_tag }}
        run: |
          set -euo pipefail
          # Same transient-5xx guard as the sideload-zip publish (dig_ecosystem#1293): the Releases
          # asset API blips, so retry each upload with backoff before failing loudly.
          retry() {
            local n=1 max=5 delay=5
            until "$@"; do
              if [ "$n" -ge "$max" ]; then
                echo "::error::\`$*\` still failing after ${max} attempts" >&2
                return 1
              fi
              echo "attempt ${n}/${max} of \`$*\` failed — retrying in ${delay}s..." >&2
              sleep "$delay"
              n=$((n + 1)); delay=$((delay + 5))
            done
          }
          CRX="$(ls dig-network-extension-v*.crx | head -n1)"
          for tag in "${DATED_TAG}" nightly; do
            retry gh release upload "$tag" "$CRX" updates.xml --repo "$REPO" --clobber
          done
      - name: Assume the updates.dig.net ext deploy role (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ vars.UPDATES_EXT_DEPLOY_ROLE }}
          aws-region: us-east-1
      - name: Publish nightly CRX + updates.xml to updates.dig.net/ext/nightly/
        env:
          BUCKET: ${{ vars.UPDATES_BUCKET }}
          DISTRIBUTION: ${{ vars.UPDATES_CF_DISTRIBUTION_ID }}
        run: |
          set -euo pipefail
          CRX="$(ls dig-network-extension-v*.crx | head -n1)"
          # Publish order (updates.dig.net runbooks/ext-hosting.md): the immutable CRX FIRST, then the
          # updates.xml LAST — so the manifest never advertises a CRX that isn't uploaded yet.
          aws s3 cp "$CRX" "s3://${BUCKET}/ext/nightly/" \
            --cache-control "public, max-age=31536000, immutable" --content-type "application/x-chrome-extension"
          aws s3 cp updates.xml "s3://${BUCKET}/ext/nightly/updates.xml" \
            --cache-control "max-age=60, must-revalidate" --content-type "text/xml"
          aws cloudfront create-invalidation --distribution-id "$DISTRIBUTION" --paths "/ext/nightly/*"
          echo "Published nightly CRX + updates.xml to updates.dig.net/ext/nightly/."
