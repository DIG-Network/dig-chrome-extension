name: deploy

# Browser extension — no S3/CloudFront origin. "Deploy" = build the packaged extension
# (node build.js --zip -> ./dist + a .zip) and attach it to a GitHub Release when a v* tag is
# pushed (the artifact you upload to the Chrome Web Store / Edge Add-ons dashboard).
#
# Tag-triggered ONLY (#590/#596): releases are batched to the nightly cron + manual dispatch
# (nightly-release.yml), so nothing builds/publishes on merge to main anymore. Per-PR build
# coverage comes from ci.yml; daily main-HEAD build coverage comes from the nightly channel. The
# `workflow_dispatch` is kept as a manual "does main still build + package?" canary.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write # create releases / upload release assets

jobs:
  build:
    name: build + package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
      - run: npm ci || npm install
      # .npmrc sets ignore-scripts=true (supply-chain lockdown, #67 P0-1a); re-run only the reviewed
      # allowlist (esbuild/@swc) before the build that relies on it.
      - run: npm run allow-scripts
      # NOTE (#489): the deploy path does NOT re-run the test suite. The PR release gates (ci.yml —
      # fmt/lint/typecheck/tests/coverage/build, §2.4a) already ran on the exact merged tree; a
      # redundant re-run here only re-exposes a green-tested release to flake (it once blocked
      # v1.96.0 — #488). Deploy = build + package + publish only.
      - run: npm run build:zip # node build.js --zip -> ./dist + ./dig-network-extension-v<version>.zip
      - name: upload build artifact
        uses: actions/upload-artifact@65c4c4a1ddee5b72f698fdd19549f0f0fb45cf08 # v4.6.0
        with:
          name: dig-extension
          path: dist/**
          if-no-files-found: error
      - name: attach zip to release (tags only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          # build.js (--zip) writes the archive to the repo root as
          # dig-network-extension-v<version>.zip (Chrome-Web-Store / sideload artifact).
          files: dig-network-extension-v*.zip
          fail_on_unmatched_files: true

  # Pack + sign the self-hosted STABLE CRX3 (#607) and publish it + its Omaha updates.xml to
  # updates.dig.net/ext/stable/ so force-installed browsers (dig-installer #612) auto-update. The
  # SIGNING KEY and the PUBLISH ROLE are both collapsed behind the `release` GitHub ENVIRONMENT:
  # EXT_NIGHTLY_CRX_KEY is a release-environment secret and the updates-dig-net-ext-deploy OIDC role
  # trusts `environment:release` — so only this gated job can sign or publish, retiring the broad
  # refs/tags/* trust arm. The CRX3 id-binding + HTTPS are the anti-tamper: a MITM cannot swap in a
  # CRX of the same id (mlibddmbhlgogepnjdienclhnkfpkfah) without the private key.
  publish-update:
    name: publish stable CRX + updates.xml
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write # attach the CRX + updates.xml to the release
      id-token: write # OIDC: assume the updates.dig.net ext deploy role
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: 20
      - run: npm ci || npm install
      - run: npm run allow-scripts
      - name: Pack + sign the stable CRX3 + emit updates.xml
        env:
          EXT_NIGHTLY_CRX_KEY: ${{ secrets.EXT_NIGHTLY_CRX_KEY }}
        run: |
          if [ -z "$EXT_NIGHTLY_CRX_KEY" ]; then
            echo "::error::EXT_NIGHTLY_CRX_KEY (release-environment secret) is not set — cannot sign the stable CRX."
            exit 1
          fi
          node build.js --crx --channel stable # ./dist + ./dig-network-extension-v<version>.crx + ./updates.xml
      - name: attach CRX + updates.xml to release
        uses: softprops/action-gh-release@c95fe1489396fe8a9eb87c0abf8aa5b2ef267fda # v2.2.1
        with:
          files: |
            dig-network-extension-v*.crx
            updates.xml
          fail_on_unmatched_files: true
      - name: Assume the updates.dig.net ext deploy role (OIDC)
        uses: aws-actions/configure-aws-credentials@e3dd6a429d7300a6a4c196c26e071d42e0343502 # v4.0.2
        with:
          role-to-assume: ${{ vars.UPDATES_EXT_DEPLOY_ROLE }}
          aws-region: us-east-1
      - name: Publish stable CRX + updates.xml to updates.dig.net/ext/stable/
        env:
          BUCKET: ${{ vars.UPDATES_BUCKET }}
          DISTRIBUTION: ${{ vars.UPDATES_CF_DISTRIBUTION_ID }}
        run: |
          set -euo pipefail
          CRX="$(ls dig-network-extension-v*.crx | head -n1)"
          # Publish order (updates.dig.net runbooks/ext-hosting.md): the immutable CRX FIRST, then the
          # updates.xml LAST — so the manifest never advertises a CRX that isn't uploaded yet.
          aws s3 cp "$CRX" "s3://${BUCKET}/ext/stable/" \
            --cache-control "public, max-age=31536000, immutable" --content-type "application/x-chrome-extension"
          aws s3 cp updates.xml "s3://${BUCKET}/ext/stable/updates.xml" \
            --cache-control "max-age=60, must-revalidate" --content-type "text/xml"
          # Invalidate the short-TTL manifest (and the channel path) so browsers see the new version.
          aws cloudfront create-invalidation --distribution-id "$DISTRIBUTION" --paths "/ext/stable/*"
          echo "Published stable CRX + updates.xml to updates.dig.net/ext/stable/."
